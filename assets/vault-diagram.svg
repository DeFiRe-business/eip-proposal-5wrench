<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="vaultBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#12141a"/>
    </linearGradient>
    <linearGradient id="hotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="unlockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="16" fill="url(#vaultBg)"/>
  <rect x="1" y="1" width="878" height="518" rx="15" fill="none" stroke="#2d3139" stroke-width="1"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="600" letter-spacing="0.5">Coercion-Resistant Vault</text>
  <text x="440" y="64" text-anchor="middle" fill="#94a3b8" font-size="12">Smart contract wallet with delayed-opening safe mechanism</text>

  <!-- ═══ HOT BALANCE BOX ═══ -->
  <rect x="32" y="90" width="260" height="240" rx="12" fill="url(#hotGrad)" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Hot icon circle -->
  <circle cx="62" cy="118" r="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="62" y="123" text-anchor="middle" fill="#fbbf24" font-size="14">⚡</text>

  <!-- Hot title -->
  <text x="84" y="114" fill="#fbbf24" font-size="14" font-weight="600">Hot Balance</text>
  <text x="84" y="131" fill="#a3864a" font-size="11">Immediate spending</text>

  <!-- Hot details -->
  <line x1="52" y1="148" x2="272" y2="148" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="0.5"/>

  <text x="52" y="174" fill="#e2e8f0" font-size="12">Rate-limited per epoch</text>
  <text x="52" y="196" fill="#94a3b8" font-size="11">e.g. 0.5 ETH / 24h</text>
  <text x="52" y="218" fill="#94a3b8" font-size="11">e.g. 500 USDC / 24h</text>

  <line x1="52" y1="236" x2="272" y2="236" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Hot check -->
  <rect x="52" y="252" width="18" height="18" rx="4" fill="#16a34a" fill-opacity="0.15" stroke="#22c55e" stroke-width="0.6"/>
  <text x="61" y="265" text-anchor="middle" fill="#4ade80" font-size="11">✓</text>
  <text x="78" y="265" fill="#cbd5e1" font-size="12">No delay, no approval</text>

  <rect x="52" y="278" width="18" height="18" rx="4" fill="#16a34a" fill-opacity="0.15" stroke="#22c55e" stroke-width="0.6"/>
  <text x="61" y="291" text-anchor="middle" fill="#4ade80" font-size="11">✓</text>
  <text x="78" y="291" fill="#cbd5e1" font-size="12">Owner key only</text>

  <rect x="52" y="304" width="18" height="18" rx="4" fill="#16a34a" fill-opacity="0.15" stroke="#22c55e" stroke-width="0.6"/>
  <text x="61" y="317" text-anchor="middle" fill="#4ade80" font-size="11">✓</text>
  <text x="78" y="317" fill="#cbd5e1" font-size="12">Resets every epoch</text>

  <!-- ═══ COLD VAULT BOX ═══ -->
  <rect x="320" y="90" width="530" height="240" rx="12" fill="url(#coldGrad)" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Cold icon -->
  <circle cx="350" cy="118" r="14" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="350" y="123" text-anchor="middle" fill="#60a5fa" font-size="14">🔒</text>

  <!-- Cold title -->
  <text x="372" y="114" fill="#60a5fa" font-size="14" font-weight="600">Cold Vault</text>
  <text x="372" y="131" fill="#4a7ab3" font-size="11">Locked funds (~95% of balance)</text>

  <line x1="340" y1="148" x2="830" y2="148" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- Unlock methods label -->
  <text x="340" y="172" fill="#cbd5e1" font-size="12" font-weight="500">Unlock methods:</text>

  <!-- Timelock box -->
  <rect x="340" y="186" width="230" height="76" rx="8" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="360" y="210" fill="#a78bfa" font-size="12" font-weight="600">⏱ Timelock</text>
  <text x="360" y="228" fill="#94a3b8" font-size="11">Wait 24-72h after request</text>
  <text x="360" y="246" fill="#94a3b8" font-size="11">Configurable by owner</text>

  <!-- Multisig box -->
  <rect x="590" y="186" width="240" height="76" rx="8" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="610" y="210" fill="#22d3ee" font-size="12" font-weight="600">🔑 Multisig</text>
  <text x="610" y="228" fill="#94a3b8" font-size="11">2-of-3 guardian approval</text>
  <text x="610" y="246" fill="#94a3b8" font-size="11">Bypasses timelock instantly</text>

  <!-- "OR" connector -->
  <rect x="577" y="211" width="26" height="20" rx="10" fill="#1e2028" stroke="#475569" stroke-width="0.5"/>
  <text x="590" y="225" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">OR</text>

  <!-- Cancel box -->
  <rect x="340" y="278" width="490" height="38" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.6" stroke-opacity="0.35"/>
  <text x="360" y="302" fill="#f87171" font-size="12" font-weight="500">🚨 Pending withdrawals are cancellable by owner or any guardian during wait</text>

  <!-- ═══ ARROW: Hot → Recipient ═══ -->
  <line x1="162" y1="330" x2="162" y2="362" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arrowAmber)"/>
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ═══ ARROW: Cold → Recipient ═══ -->
  <path d="M585 330 L585 345 L440 345 L440 362" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4 3" marker-end="url(#arrowBlue)"/>

  <!-- ═══ RECIPIENT BOX ═══ -->
  <rect x="100" y="365" width="680" height="44" rx="8" fill="#16a34a" fill-opacity="0.08" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="440" y="392" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="500">Recipient receives funds</text>

  <!-- ═══ BOTTOM: Under coercion message ═══ -->
  <rect x="32" y="430" width="816" height="68" rx="10" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.25"/>

  <text x="52" y="454" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1">UNDER COERCION</text>
  <text x="52" y="474" fill="#e2e8f0" font-size="12" font-style="italic">"I can only send you 0.5 ETH and 100 USDC right now. The rest is locked for 72 hours.</text>
  <text x="52" y="490" fill="#e2e8f0" font-size="12" font-style="italic"> You can verify this on-chain. I physically cannot access it faster."</text>

  <!-- ═══ LABELS: instant vs delayed ═══ -->
  <text x="162" y="352" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="500">INSTANT</text>
  <text x="585" y="352" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="500">24-72h DELAY</text>

  <!-- ═══ BADGES: ETH + ERC-20 ═══ -->
  <rect x="32" y="90" width="55" height="18" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="59" y="102" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">ETH</text>

  <rect x="92" y="90" width="68" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.2"/>
  <text x="126" y="102" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">ERC-20</text>

  <rect x="320" y="90" width="55" height="18" rx="4" fill="#3b82f6" fill-opacity="0.2"/>
  <text x="347" y="102" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">ETH</text>

  <rect x="380" y="90" width="68" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.2"/>
  <text x="414" y="102" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">ERC-20</text>
</svg>